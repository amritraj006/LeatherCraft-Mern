services:
  # ----------------------------------------
  # Backend API (Node.js Web Service)
  # ----------------------------------------
  - type: web
    name: leathercraft-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # You must set this in the Render dashboard!
      - key: JWT_SECRET
        generateValue: true # Generates a secure random secret automatically
      - key: CLOUDINARY_URL
        sync: false # Set this in Render dashboard
      - key: STRIPE_SECRET
        sync: false # Set this in Render dashboard

  # ----------------------------------------
  # Customer Storefront (Static Site)
  # ----------------------------------------
  - type: web
    name: leathercraft-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: leathercraft-backend
          envVarKey: RENDER_EXTERNAL_URL
          property: url

  # ----------------------------------------
  # Seller Portal (Static Site)
  # ----------------------------------------
  - type: web
    name: leathercraft-seller
    env: static
    rootDir: seller
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: leathercraft-backend
          envVarKey: RENDER_EXTERNAL_URL
          property: url

  # ----------------------------------------
  # Admin Dashboard (Static Site)
  # ----------------------------------------
  - type: web
    name: leathercraft-admin
    env: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: leathercraft-backend
          envVarKey: RENDER_EXTERNAL_URL
          property: url
